name: code-writer
version: "1.0"
description: >
  Implements code based on a plan. Full access to filesystem tools —
  reads existing code, writes files, and runs commands (install, build, test).

context:
  reads: ["input.*", "planner.*"]
  writes: ["coder.*"]

allowed_tools:
  - read_file
  - write_file
  - list_files
  - run_command
  - search_files

constraints:
  min_tokens: 8000
  recommended_models:
    - claude-sonnet-4-20250514
    - gpt-4o
    - deepseek-coder
