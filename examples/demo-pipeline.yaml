name: demo-pipeline
version: "0.1.0"

context:
  backend: sqlite
  vector: embedded
  ttl: "7d"

# Just list the providers you want to use.
# API keys and endpoints are resolved automatically.
providers:
  - anthropic
  - ollama

stages:
  planner:
    provider: anthropic
    model: claude-sonnet-4-6
    skill: core/arch-planner@1.0
    context:
      read: ["input.*"]
      write: ["planner.*"]
  coder:
    provider: ollama
    model: qwen3.5:9b
    skill: core/code-writer@1.0
    context:
      read: ["input.*", "planner.*"]
      write: ["coder.*"]
    depends_on: [planner]

policies:
  global:
    audit_log: true
