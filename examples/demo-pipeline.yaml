name: demo-pipeline
version: "0.1.0"

context:
  backend: sqlite
  vector: embedded
  ttl: "7d"

providers:
  openai:
    type: openai-compatible
    base_url: https://api.openai.com/v1
    api_key: ${OPENAI_API_KEY}
  local:
    type: ollama
    base_url: http://localhost:11434

stages:
  planner:
    provider: openai
    model: gpt-4o
    skill: core/arch-planner@1.0
    context:
      read: ["input.*"]
      write: ["planner.*"]
  coder:
    provider: local
    model: qwen3.5:9b
    skill: core/code-writer@1.0
    context:
      read: ["input.*", "planner.*"]
      write: ["coder.*"]
    depends_on: [planner]

policies:
  global:
    audit_log: true
