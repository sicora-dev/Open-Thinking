# OpenThinking Pipeline Configuration

name: feature-development
version: "1.0"

context:
  backend: sqlite
  vector: embedded
  ttl: 7d

# Just list providers by name. API keys come from ~/.openthk/providers.json.
# For custom providers not in the catalog, use the object form:
#   - id: my-custom
#     base_url: https://custom.api.com/v1
providers:
  - anthropic
  - ollama

stages:
  planning:
    provider: anthropic
    model: claude-opus-4-5-20250520
    skill: openthk/arch-planner@1.0
    context:
      read: ["input.*"]
      write: [plan.*]
    max_tokens: 16000
    temperature: 0.7

  develop:
    provider: anthropic
    model: claude-sonnet-4-20250514
    skill: openthk/code-writer@1.0
    context:
      read: [plan.*, code.decisions]
      write: [code.*]
    depends_on: [planning]
    max_tokens: 32000
    temperature: 0.3

  testing:
    provider: anthropic
    model: claude-sonnet-4-20250514
    skill: openthk/test-gen@1.0
    context:
      read: [plan.*, code.*]
      write: [test.*]
    depends_on: [develop]
    max_tokens: 8000
    temperature: 0.2
    on_fail:
      retry_stage: develop
      max_retries: 3
      inject_context: test.failures

policies:
  global:
    rate_limit: 100/hour
    audit_log: true
    cost_limit: $50/run
